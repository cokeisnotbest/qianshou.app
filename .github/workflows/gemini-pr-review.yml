name: Gemini AI Code Review

on:
 pull_request:
 # 指定触发条件：当 PR 被新建、更新代码或解除草稿状态时运行
 types: [opened, synchronize, reopened, ready_for_review]

jobs:
 gemini-review:
 runs-on: ubuntu-latest
 permissions:
 contents: read
 pull-requests: write # 必须开启此权限，AI 才能在 PR 中发表评论

 steps:
 - name: Checkout repository
 uses: actions/checkout@v4

 - name: Run Gemini AI Reviewer
 uses: sshnaidm/gemini-code-review-action@v2
 with:
 gemini-key: ${{ secrets.GEMINI_API_KEY }}
 # 使用 GitHub 自动分发的临时 Token
 github-token: ${{ secrets.GITHUB_TOKEN }}
 # 指定模型（推荐使用 gemini-2.5-flash 兼顾速度，或 gemini-2.5-pro 提升逻辑推理能力）
 model: 'gemini-2.5-flash'
